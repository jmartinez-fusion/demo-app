<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Visitantes - OpenShift</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #0066cc; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #555; }
        .status { font-size: 0.9em; color: #666; margin-bottom: 10px; text-align: center; }
        .badge { background: #e1f5fe; color: #01579b; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>App Full-Stack en OpenShift</h1>
        <p class="status" id="status">Conectando con la API...</p>
        
        <table id="visitors-table" style="display:none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre del Visitante</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody id="visitors-body">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchVisitors() {
            const statusEl = document.getElementById('status');
            const tableEl = document.getElementById('visitors-table');
            const bodyEl = document.getElementById('visitors-body');

            try {
                // IMPORTANTE: Usamos ruta relativa '/api/visitors' 
                // Esto requiere que el Nginx del frontend actúe como proxy.
                const response = await fetch('/api/visitors');
                
                if (!response.ok) throw new Error('Error en la respuesta de la API');
                
                const data = await response.json();

                if (data.length === 0) {
                    statusEl.innerText = "No hay visitantes registrados aún.";
                } else {
                    statusEl.style.display = 'none';
                    tableEl.style.display = 'table';
                    
                    bodyEl.innerHTML = data.map(v => `
                        <tr>
                            <td><span class="badge">#${v.id}</span></td>
                            <td><strong>${v.name}</strong></td>
                            <td>${new Date(v.visited_at).toLocaleString()}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                statusEl.innerText = "Error al cargar datos de la base de datos.";
                statusEl.style.color = "red";
            }
        }

        // Ejecutar al cargar la página
        fetchVisitors();
    </script>
</body>
</html>
