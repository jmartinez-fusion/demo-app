server {
    listen 8080;
    
    # Cambiamos esto para que sea más flexible
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # QUITAMOS la barra final de 'api' para que atrape /api y /api/visitors
    location /api {
        proxy_pass http://demo-backend:8080; # Sin la barra al final aquí también
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}